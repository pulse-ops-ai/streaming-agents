name: Lambda Build

on:
  push:
    branches:
      - '**'
    paths:
      - 'apps/lambdas/**'
      - 'packages/**'
      - 'python/**'
      - 'tools/bundle-lambda.ts'
      - 'pnpm-lock.yaml'
      - '.github/workflows/lambda-build.yml'

  pull_request:
    paths:
      - 'apps/lambdas/**'
      - 'packages/**'
      - 'python/**'
      - 'tools/bundle-lambda.ts'
      - 'pnpm-lock.yaml'
      - '.github/workflows/lambda-build.yml'

  workflow_dispatch:

env:
  NODE_VERSION: '22'
  PYTHON_VERSION: '3.12'

jobs:
  # ── Job 1: Build TypeScript Lambdas ─────────────────────────────
  build-typescript:
    name: Build TypeScript Lambdas
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build TypeScript packages
        run: pnpm build

      - name: Run tests
        run: pnpm test

      - name: Bundle Lambda functions
        run: npx tsx tools/bundle-lambda.ts

      - name: Upload TypeScript Lambda artifacts
        uses: actions/upload-artifact@v4
        with:
          name: typescript-lambdas-${{ github.sha }}
          path: dist/lambdas/*.zip
          retention-days: 30

  # ── Job 2: Build Python Lambdas ─────────────────────────────────
  build-python:
    name: Build Python Lambdas
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Build Python Lambdas
        run: |
          PYTHON_LAMBDAS=(
            "reachy-exporter"
          )

          mkdir -p dist/lambdas

          for lambda in "${PYTHON_LAMBDAS[@]}"; do
            echo "Building Python Lambda: $lambda..."
            cd "python/services/$lambda"

            rm -rf dist
            mkdir -p dist

            uv sync --frozen
            uv pip compile pyproject.toml -o requirements.txt
            pip install -r requirements.txt -t dist/

            cp -r src/* dist/

            cd dist
            zip -r "../../../../dist/lambdas/${lambda}.zip" .
            cd -

            cd ../../..
          done

      - name: Upload Python Lambda artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-lambdas-${{ github.sha }}
          path: dist/lambdas/*.zip
          retention-days: 30

  # ── Job 3: Upload to S3 (on main branch only) ──────────────────
  upload-to-s3:
    name: Upload Artifacts to S3
    runs-on: ubuntu-latest
    needs: [build-typescript, build-python]
    if: github.ref == 'refs/heads/main'
    environment: dev
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download TypeScript artifacts
        uses: actions/download-artifact@v4
        with:
          name: typescript-lambdas-${{ github.sha }}
          path: dist/lambdas

      - name: Download Python artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-lambdas-${{ github.sha }}
          path: dist/lambdas

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_DEV }}
          aws-region: us-east-1

      - name: Create S3 bucket for Lambda artifacts (if not exists)
        run: |
          BUCKET_NAME="streaming-agents-lambda-artifacts"

          if ! aws s3 ls "s3://${BUCKET_NAME}" 2>&1 | grep -q 'NoSuchBucket'; then
            echo "Bucket already exists"
          else
            echo "Creating bucket..."
            aws s3 mb "s3://${BUCKET_NAME}" --region us-east-1

            aws s3api put-bucket-versioning \
              --bucket "${BUCKET_NAME}" \
              --versioning-configuration Status=Enabled

            aws s3api put-public-access-block \
              --bucket "${BUCKET_NAME}" \
              --public-access-block-configuration \
                BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true
          fi

      - name: Upload artifacts to S3
        run: |
          BUCKET_NAME="streaming-agents-lambda-artifacts"
          COMMIT_SHA="${{ github.sha }}"

          for zip_file in dist/lambdas/*.zip; do
            lambda_name=$(basename "$zip_file" .zip)

            aws s3 cp "$zip_file" \
              "s3://${BUCKET_NAME}/${COMMIT_SHA}/${lambda_name}.zip" \
              --metadata "commit=${COMMIT_SHA},branch=${{ github.ref_name }},build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)"

            aws s3 cp "$zip_file" \
              "s3://${BUCKET_NAME}/latest/${{ github.ref_name }}/${lambda_name}.zip" \
              --metadata "commit=${COMMIT_SHA},branch=${{ github.ref_name }},build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)"

            echo "Uploaded: ${lambda_name}.zip"
          done

      - name: Output artifact locations
        run: |
          echo "## Lambda Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Artifacts uploaded to S3:" >> $GITHUB_STEP_SUMMARY
          echo "- Commit SHA: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- S3 Path: \`s3://streaming-agents-lambda-artifacts/${{ github.sha }}/\`" >> $GITHUB_STEP_SUMMARY
          echo "- Latest Path: \`s3://streaming-agents-lambda-artifacts/latest/${{ github.ref_name }}/\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Built Lambdas:" >> $GITHUB_STEP_SUMMARY
          for zip_file in dist/lambdas/*.zip; do
            lambda_name=$(basename "$zip_file" .zip)
            size=$(du -h "$zip_file" | cut -f1)
            echo "- \`${lambda_name}\` (${size})" >> $GITHUB_STEP_SUMMARY
          done
