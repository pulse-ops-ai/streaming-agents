version: "3"

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  install:
    desc: Install all dependencies
    cmds:
      - pnpm install

  dev:
    desc: Start local development
    cmds:
      - pnpm run dev

  build:
    desc: Build all packages and services
    cmds:
      - pnpm run build

  test:
    desc: Run all tests
    cmds:
      - pnpm run test

  lint:
    desc: Lint everything
    cmds:
      - pnpm run lint

  infra:up:
    desc: Spin up LocalStack infrastructure
    cmds:
      - docker compose up -d
      - sleep 5
      - cmd: tflocal init
        dir: infra/envs/localstack
      - cmd: tflocal apply -auto-approve
        dir: infra/envs/localstack

  infra:down:
    desc: Tear down LocalStack infrastructure
    cmds:
      - cmd: tflocal destroy -auto-approve
        dir: infra/envs/localstack
        ignore_error: true
      - docker compose down -v

  seed:
    desc: Seed local data
    cmds:
      - bash scripts/seed/seed.sh

  teardown:
    desc: Full teardown of local environment
    cmds:
      - bash scripts/teardown/teardown.sh
